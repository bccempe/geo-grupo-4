version: "3.9"

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: postgis_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: fastapi_backend
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: streamlit_app
    restart: always
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      API_URL: ${API_URL}
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app

volumes:
  postgres_data: